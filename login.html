<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Вход — FreeDom</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Подключаем стабильную версию Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0d17;
            color: #eae6f0;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 440px;
            width: 100%;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 2rem 1.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .logo { text-align: center; font-size: 2.2rem; color: #d4af37; font-weight: 300; margin-bottom: 0.5rem; }
        .logo span { color: #d4af37; }
        .subtitle { text-align: center; opacity: 0.6; margin-bottom: 1.8rem; font-size: 0.9rem; }
        .field { margin-bottom: 1rem; }
        .field label { display: block; font-weight: 500; margin-bottom: 4px; color: #b8a9d4; font-size: 0.9rem; }
        .field input {
            width: 100%;
            padding: 10px 14px;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            color: #eae6f0;
            font-family: inherit;
            transition: 0.3s;
        }
        .field input:focus {
            border-color: rgba(212,175,55,0.2);
            outline: none;
            background: rgba(255,255,255,0.06);
        }
        .field input::placeholder { color: rgba(255,255,255,0.2); }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(145deg, #d4af37, #b8952a);
            color: #0b0d17;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 0.5rem;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 4px 20px rgba(212,175,55,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error {
            background: rgba(255,0,0,0.1);
            border: 1px solid rgba(255,0,0,0.2);
            color: #ff6b6b;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }
        .success-msg {
            background: rgba(37,211,102,0.08);
            border: 1px solid rgba(37,211,102,0.15);
            color: #25D366;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }
        .footer-link { text-align: center; margin-top: 1.2rem; font-size: 0.9rem; opacity: 0.6; }
        .footer-link a { color: #d4af37; text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
        .back-link { display: inline-block; color: #b8a9d4; text-decoration: none; font-size: 0.85rem; margin-bottom: 0.5rem; transition: 0.2s; }
        .back-link:hover { color: #d4af37; }
        .result-box {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            display: none;
            text-align: center;
        }
        .result-box.show { display: block; }
        .result-box.error { background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.2); color: #ff6b6b; }
        .result-box.success { background: rgba(37,211,102,0.08); border: 1px solid rgba(37,211,102,0.15); color: #25D366; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← На главную</a>
        <div class="logo">🌿 <span>Free</span>Dom</div>
        <div class="subtitle">Войдите в свой аккаунт</div>

        <form id="loginForm">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="ivan@mail.ru" required>
            </div>
            <div class="field">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="••••••" required>
            </div>

            <div id="resultMessage" class="result-box"></div>

            <button type="submit" class="btn" id="submitBtn">Войти</button>
        </form>

        <div class="footer-link">
            Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // ===== ПОДКЛЮЧЕНИЕ К SUPABASE =====
            const SUPABASE_URL = 'https://vutmbhsclmcfqqlzxqkc.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1dG1iaHNjbG1jZnFxbHp4cWtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1ODY1OTEsImV4cCI6MjEwMDE2MjU5MX0.PxvaHbwqJjOlStrr0HQx8xulR3BLPxzm4EQWl2LFu2c';

            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const resultMessage = document.getElementById('resultMessage');
            const submitBtn = document.getElementById('submitBtn');

            // Проверка, не авторизован ли пользователь уже
            supabase.auth.getSession().then(({ data }) => {
                if (data.session) {
                    window.location.href = 'profile.html';
                }
            });

            // Обработка отправки формы
            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                // Скрываем старое сообщение
                resultMessage.className = 'result-box';
                resultMessage.style.display = 'none';
                submitBtn.disabled = true;
                submitBtn.textContent = 'Вход...';

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                if (!email || !password) {
                    resultMessage.textContent = 'Заполните все поля.';
                    resultMessage.className = 'result-box error show';
                    resultMessage.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Войти';
                    return;
                }

                try {
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });

                    if (error) {
                        console.error('Ошибка входа:', error);
                        let message = 'Неверный email или пароль.';
                        if (error.message.includes('Invalid login credentials')) {
                            message = 'Неверный email или пароль.';
                        } else if (error.message.includes('Email not confirmed')) {
                            message = 'Подтвердите email перед входом.';
                        } else if (error.message.includes('User not found')) {
                            message = 'Пользователь с таким email не найден.';
                        }
                        resultMessage.textContent = message;
                        resultMessage.className = 'result-box error show';
                        resultMessage.style.display = 'block';
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Войти';
                        return;
                    }

                    // Успешный вход
                    console.log('Вход выполнен:', data.user);
                    resultMessage.textContent = '✅ Вход выполнен! Перенаправляем...';
                    resultMessage.className = 'result-box success show';
                    resultMessage.style.display = 'block';
                    submitBtn.textContent = 'Готово!';

                    setTimeout(() => {
                        window.location.href = 'profile.html';
                    }, 1500);

                } catch (error) {
                    console.error('Критическая ошибка:', error);
                    resultMessage.textContent = 'Произошла ошибка. Попробуйте позже.';
                    resultMessage.className = 'result-box error show';
                    resultMessage.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Войти';
                }
            });
        });
    </script>
</body>
</html>
